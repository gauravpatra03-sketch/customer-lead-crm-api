# Render deployment configuration for customer-lead-crm-api
# This deploys the Spring Boot API as a Docker container. The MySQL database is hosted on Railway.
# Render does not have a native "java" runtime, so we build/run via Docker (Java 21).
# After creating this service on Render, set the environment variables below
# using the connection details from your Railway MySQL instance.

services:
  - type: web
    name: customer-lead-crm-api
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /swagger-ui.html
    envVars:
      # Copy these values from your Railway MySQL connection string.
      # Example Railway URL: mysql://user:password@host.railway.app:3306/customer_lead_crm
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      # Set this to your frontend URL in production (leave as localhost for API-only testing)
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:4200
      # Render automatically provides the PORT variable; the app reads server.port=${PORT:8080}