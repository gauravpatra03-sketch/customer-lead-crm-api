spring.application.name=customer-lead-crm-api

# Server Configuration
# Render injects the PORT environment variable at runtime; defaults to 8080 locally
server.port=${PORT:8080}

# Database Configuration
# On Render, set SPRING_DATASOURCE_URL/USERNAME/PASSWORD from your Railway MySQL connection string.
# Local defaults are used for development only.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/customer_lead_crm?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Python@2003}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# CORS Configuration
# Set CORS_ALLOWED_ORIGINS to your frontend URL in production (e.g. the Render frontend URL)
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
cors.allowed.methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed.headers=*
cors.allow-credentials=true

# API Configuration
api.base-path=/api

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
